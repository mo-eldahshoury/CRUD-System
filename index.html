<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>

<body>

    <div class="container py-5">
        <label for="pn">product name</label>
        <input type="text" class="form-control mb-4" id="pn">

        <label for="pp">product price</label>
        <input type="text" class="form-control mb-4" id="pp">

        <label for="pc">product category</label>
        <input type="text" class="form-control mb-4" id="pc">

        <label for="pd">product description</label>
        <textarea class="form-control mb-4" id="pd"></textarea>
        <button id="add-btn" onclick="addNewElement()" class="btn btn-outline-info"> Add Product </button>
        <button onclick="updateProduct()" id="update-btn" class="btn btn-primary" style="display: none;">Update Product</button>
        <input type="text" id="search" class="form-control  my-4" onkeyup="search( this.value)"placeholder="Search for a product..." />

        <table class="table table-hover" >
            <thead>
                <tr>
                    <th>Name</th>
                    <th>price</th>
                    <th>category</th>
                    <th>description</th>
                    <th>Delete</th>
                    <th>Update</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>

    </div>
    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
